<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body {
      background-color: aliceblue;
      margin: 150px;
      padding: 120px;
    }
    .box {
      display: flex;
  flex-wrap: wrap; 
      background-color: black;
      height: 1000px;
      width: 600px;
      color: yellow;
      font-size: 40px;
      font-weight: 900;
       text-align: center;
       padding: 100px;
       margin: 100px;
       /* overflow: auto */
       /* overflow: hidden; */
       /* overflow-y: scroll */

    }
   
     .number {
/* box-sizing: border-box; */
margin: 50px;
 background-color:rgb(22, 56, 86);
 height: 100px;
 width: 100px;
text-align: center;
padding-top: 50px;
border-radius: 50%;

 }
  </style>
</head>
<body>
  <div class="box">
  <div class="number" id="one"> 1 </div>
  <div class="number" id="two"> 2 </div>
  <div class="number" id="three"> 3 </div>
  <div class="number" id="four"> 4 </div>
  <div class="number" id="five"> 5 </div>
  <div class="number" id="six"> 6 </div>
  <div class="number" id="seven"> 7 </div>
  <div class="number" id="eight"> 8 </div>
  <div class="number" id="nine"> 9 </div>
  <div class="number" id="zero"> 0 </div>
</div>


  <script src="index.js"></script>
</body>
</html>
